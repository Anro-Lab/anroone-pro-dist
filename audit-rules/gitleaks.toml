# gitleaks config for msi-jinni-dist audit gate.
# Extends gitleaks default ruleset and adds custom Firebase / service-account rules.

title = "msi-jinni-dist audit gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "gcp-service-account-json"
description = "GCP / Firebase service account JSON key (type: service_account)"
regex = '''(?i)"type"\s*:\s*"service_account"'''
tags = ["key", "gcp", "firebase", "service-account"]

[[rules]]
id = "firebase-admin-sdk-private-key"
description = "Firebase Admin SDK private_key field"
regex = '''(?i)"private_key"\s*:\s*"-----BEGIN (RSA |EC )?PRIVATE KEY-----'''
tags = ["key", "firebase", "private-key"]

[[rules]]
id = "firebase-admin-sdk-filename-marker"
description = "Firebase Admin SDK JSON filename marker found inside content"
regex = '''[a-z0-9-]+-firebase-adminsdk-[a-z0-9]+\.json'''
tags = ["firebase", "admin-sdk", "filename"]

[allowlist]
description = "Allowlist for fixture-test scaffolding and known-safe app artifacts"
paths = [
  '''audit-rules/fixtures/.*''',
  '''README\.md$''',
  '''audit-rules/gitleaks\.toml$''',
  # Docker-compose template files contain intentional placeholder credentials
  # (e.g. monica_pass123, yourls_pass) for self-hosted service setup wizards.
  '''resources/backend/docker-compose-templates/.*''',
  # app.asar is a compiled Electron binary archive. Its binary sections produce
  # false-positive aws-access-token matches. Source secrets are caught by
  # AI-Desktop CI and the forbidden-paths gate; trufflehog (verified-only) runs
  # separately and covers the text sections of the asar.
  '''.*\.asar$'''
]
regexes = [
  # Firebase Web Client API key (AIzaSy?? ??public by design; required in
  # client-side Firebase SDK initialisation and safe to ship in the app bundle.
  '''AIzaSy[0-9A-Za-z_-]{33}''',
  # VAPID public key ??the well-known example key shipped by web-push-libs /
  # firebase-messaging docs; appears in multiple node_modules packages.
  '''BDOU99-h67HcA6JeFXHbSNMu7e2yNNu3RzoMj8TM4W88jITfq7ZmPvIM1Iv-4_l2LxQc'''
]
