name: 'Run Audit'
description: 'Run the full audit gate (gitleaks + trufflehog + forbidden-paths + size + integrity) against an unpacked release tree.'
inputs:
  unpack-dir:
    description: 'Directory containing unpacked release files'
    required: true
  baseline-size:
    description: 'Previous release zip size in bytes (empty string = no baseline)'
    required: false
    default: ''
  new-size:
    description: 'New release zip size in bytes'
    required: false
    default: ''
  require-integrity:
    description: 'If true, require win-unpacked/ and docker-compose.yml to exist'
    required: false
    default: 'true'
outputs:
  result:
    description: 'PASS or FAIL'
    value: ${{ steps.summary.outputs.result }}
  reason:
    description: 'Failure reason (empty on PASS)'
    value: ${{ steps.summary.outputs.reason }}
runs:
  using: 'composite'
  steps:
    - name: Run gitleaks
      id: gitleaks
      shell: bash
      continue-on-error: true
      env:
        UNPACK_DIR: ${{ inputs.unpack-dir }}
      run: |
        set +e
        if ! command -v gitleaks >/dev/null 2>&1; then
          # Install gitleaks locally to runner workspace if absent
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          export PATH="/tmp:$PATH"
        fi
        gitleaks detect \
          --config "${GITHUB_ACTION_PATH}/../../../audit-rules/gitleaks.toml" \
          --source "${UNPACK_DIR}" \
          --no-git \
          --redact \
          --no-banner \
          --exit-code 1 \
          --report-path /tmp/gitleaks-report.json \
          --report-format json
        rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"
        if [ -s /tmp/gitleaks-report.json ]; then
          echo "--- gitleaks findings ---"
          cat /tmp/gitleaks-report.json || true
        fi
        exit 0

    - name: Run trufflehog filesystem scan
      id: trufflehog
      shell: bash
      continue-on-error: true
      env:
        UNPACK_DIR: ${{ inputs.unpack-dir }}
      run: |
        set +e
        if ! command -v trufflehog >/dev/null 2>&1; then
          TH_VERSION="3.78.0"
          curl -sSL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TH_VERSION}/trufflehog_${TH_VERSION}_linux_amd64.tar.gz" -o /tmp/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog.tar.gz -C /tmp trufflehog
          export PATH="/tmp:$PATH"
        fi
        trufflehog filesystem "${UNPACK_DIR}" --only-verified --fail --json > /tmp/trufflehog-report.json
        rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"
        if [ -s /tmp/trufflehog-report.json ]; then
          echo "--- trufflehog findings ---"
          head -c 4096 /tmp/trufflehog-report.json || true
        fi
        exit 0

    - name: Forbidden paths scan
      id: forbidden
      shell: bash
      continue-on-error: true
      env:
        UNPACK_DIR: ${{ inputs.unpack-dir }}
      run: |
        set -u
        rules="${GITHUB_ACTION_PATH}/../../../audit-rules/forbidden-paths.txt"
        hits=0
        while IFS= read -r pattern; do
          # skip blanks + comments
          case "$pattern" in
            ''|\#*) continue ;;
          esac
          # Normalise: dir patterns end with '/'; otherwise treat as glob over basename + path substring
          if [[ "$pattern" == */ ]]; then
            found=$(find "${UNPACK_DIR}" -type d -name "${pattern%/}" -print 2>/dev/null | head -20)
          elif [[ "$pattern" == *\** ]]; then
            # glob -> match basename
            found=$(find "${UNPACK_DIR}" -type f -iname "$pattern" -print 2>/dev/null | head -20)
          else
            found=$(find "${UNPACK_DIR}" -iname "$pattern" -print 2>/dev/null | head -20)
          fi
          if [ -n "$found" ]; then
            echo "FORBIDDEN-PATH HIT: pattern='$pattern'"
            echo "$found"
            hits=$((hits+1))
          fi
        done < "$rules"
        echo "hits=$hits" >> "$GITHUB_OUTPUT"
        if [ "$hits" -gt 0 ]; then exit 1; fi
        exit 0

    - name: Size policy
      id: size
      shell: bash
      continue-on-error: true
      env:
        BASELINE: ${{ inputs.baseline-size }}
        NEW_SIZE: ${{ inputs.new-size }}
      run: |
        set -u
        # Inline size policy logic mirroring size_policy_test.sh.
        # Reads warn_pct/fail_pct/skip_if_no_baseline from size-policy.yml.
        cfg="${GITHUB_ACTION_PATH}/../../../audit-rules/size-policy.yml"
        warn_pct=$(awk -F': *' '/^warn_pct:/ {print $2}' "$cfg")
        fail_pct=$(awk -F': *' '/^fail_pct:/ {print $2}' "$cfg")
        skip=$(awk -F': *' '/^skip_if_no_baseline:/ {print $2}' "$cfg")
        : "${warn_pct:=50}"
        : "${fail_pct:=100}"
        : "${skip:=true}"

        if [ -z "${BASELINE:-}" ] || [ "${BASELINE}" = "0" ]; then
          if [ "$skip" = "true" ]; then
            echo "size policy: baseline missing, skipped"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "size policy: no baseline and skip disabled -> FAIL"
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        fi

        if [ -z "${NEW_SIZE:-}" ] || [ "${NEW_SIZE}" = "0" ]; then
          echo "size policy: new size unknown -> FAIL"
          echo "result=FAIL" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        if [ "$NEW_SIZE" -ge "$BASELINE" ]; then
          diff=$(( NEW_SIZE - BASELINE ))
        else
          diff=$(( BASELINE - NEW_SIZE ))
        fi
        delta_pct=$(( diff * 100 / BASELINE ))
        echo "size policy: baseline=${BASELINE} new=${NEW_SIZE} delta_pct=${delta_pct}% warn=${warn_pct}% fail=${fail_pct}%"

        if [ "$delta_pct" -ge "$fail_pct" ]; then
          echo "result=FAIL" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        if [ "$delta_pct" -ge "$warn_pct" ]; then
          echo "::warning::size delta ${delta_pct}% exceeds warn threshold ${warn_pct}%"
        fi
        echo "result=PASS" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Integrity check
      id: integrity
      shell: bash
      continue-on-error: true
      env:
        UNPACK_DIR: ${{ inputs.unpack-dir }}
        REQUIRE: ${{ inputs.require-integrity }}
      run: |
        set -u
        if [ "$REQUIRE" != "true" ]; then
          echo "integrity: not required, skipped"
          exit 0
        fi
        missing=""
        if ! find "${UNPACK_DIR}" -maxdepth 4 -type d -iname 'win-unpacked' | grep -q .; then
          missing="${missing} win-unpacked/"
        fi
        if ! find "${UNPACK_DIR}" -maxdepth 4 -type f -iname 'docker-compose.yml' -o -iname 'docker-compose.yaml' 2>/dev/null | grep -q .; then
          missing="${missing} docker-compose.yml"
        fi
        if [ -n "$missing" ]; then
          echo "INTEGRITY FAIL: missing required entries:${missing}"
          exit 1
        fi
        echo "integrity: ok"
        exit 0

    - name: Aggregate result
      id: summary
      shell: bash
      env:
        GITLEAKS_RC: ${{ steps.gitleaks.outputs.rc }}
        TRUFFLEHOG_RC: ${{ steps.trufflehog.outputs.rc }}
        FORBIDDEN_OUTCOME: ${{ steps.forbidden.outcome }}
        SIZE_OUTCOME: ${{ steps.size.outcome }}
        INTEGRITY_OUTCOME: ${{ steps.integrity.outcome }}
      run: |
        set -u
        reasons=""
        if [ "${GITLEAKS_RC:-0}" != "0" ]; then reasons="${reasons}gitleaks;"; fi
        if [ "${TRUFFLEHOG_RC:-0}" != "0" ]; then reasons="${reasons}trufflehog;"; fi
        if [ "${FORBIDDEN_OUTCOME}" = "failure" ]; then reasons="${reasons}forbidden-paths;"; fi
        if [ "${SIZE_OUTCOME}" = "failure" ]; then reasons="${reasons}size-policy;"; fi
        if [ "${INTEGRITY_OUTCOME}" = "failure" ]; then reasons="${reasons}integrity;"; fi
        if [ -n "$reasons" ]; then
          echo "result=FAIL" >> "$GITHUB_OUTPUT"
          echo "reason=${reasons}" >> "$GITHUB_OUTPUT"
          echo "AUDIT FAIL: ${reasons}"
          exit 0
        fi
        echo "result=PASS" >> "$GITHUB_OUTPUT"
        echo "reason=" >> "$GITHUB_OUTPUT"
        echo "AUDIT PASS"
